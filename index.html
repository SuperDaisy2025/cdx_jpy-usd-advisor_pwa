<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#132238" />
    <title>USD/JPY Advisor</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Simulation only</p>
        <h1>USD/JPY Advisor</h1>
      </div>
      <div class="status-pill" id="updateStatus">Loading</div>
    </header>

    <main class="shell">
      <section class="forecast-panel">
        <div class="forecast-main">
          <p class="section-label">今日の予測</p>
          <h2 id="forecastDirection">--</h2>
          <p id="forecastSummary" class="summary"></p>
        </div>
        <div class="action-box">
          <p class="section-label">推奨アクション</p>
          <div class="action-grid">
            <div>
              <span>動かす比率</span>
              <strong id="allocationRatio">--</strong>
            </div>
            <div>
              <span>想定金額</span>
              <strong id="allocationAmount">--</strong>
            </div>
            <div>
              <span>信頼度</span>
              <strong id="confidence">--</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="metrics-grid">
        <article class="metric">
          <span>現在資産</span>
          <strong id="totalAsset">--</strong>
        </article>
        <article class="metric">
          <span>損益</span>
          <strong id="pnl">--</strong>
        </article>
        <article class="metric">
          <span>USD/JPY</span>
          <strong id="spotRate">--</strong>
        </article>
        <article class="metric">
          <span>過去的中率</span>
          <strong id="hitRate">--</strong>
        </article>
      </section>

      <section class="layout">
        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">資産推移</p>
              <h3>1時間ごとの含み損益</h3>
            </div>
          </div>
          <canvas id="assetChart" width="960" height="360" aria-label="資産推移グラフ"></canvas>
        </article>

        <article class="panel">
          <p class="section-label">理由</p>
          <ul id="reasonList" class="reason-list"></ul>
        </article>
      </section>

      <section class="layout">
        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">USD/JPY チャート</p>
              <h3>短期レート</h3>
            </div>
          </div>
          <canvas id="fxChart" width="960" height="300" aria-label="USD/JPYチャート"></canvas>
        </article>

        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <p class="section-label">IMM 円ポジション</p>
              <h3>週次ネットポジション</h3>
            </div>
          </div>
          <canvas id="immChart" width="960" height="300" aria-label="IMM円ポジションチャート"></canvas>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="section-label">取引履歴</p>
            <h3>シミュレーション記録</h3>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日時</th>
                <th>判断</th>
                <th>比率</th>
                <th>金額</th>
                <th>レート</th>
                <th>評価額</th>
              </tr>
            </thead>
            <tbody id="tradeRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
